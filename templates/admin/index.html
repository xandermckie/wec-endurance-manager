{% extends "base.html" %}
{% block content %}
<div class="page-header"><h1>Admin Panel</h1><p>Localhost-only god-mode tools.</p></div>
<div class="card-wec"><div class="card-wec-body d-flex gap-sm flex-wrap">
  {% if season %}
  <a class="btn-wec-secondary" href="{{ url_for('admin.admin_players') }}">Drivers</a>
  <a class="btn-wec-secondary" href="{{ url_for('admin.admin_create_player') }}">Create Driver</a>
  <a class="btn-wec-secondary" href="{{ url_for('admin.admin_teams') }}">Teams</a>
  {% else %}
  <p class="text-muted-wec mb-0">Start a season to use the admin tools.</p>
  {% endif %}
</div></div>
{% endblock %}
