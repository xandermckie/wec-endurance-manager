{% extends "base.html" %}
{% block content %}
<div class="page-header"><h1>Admin · Drivers</h1></div>
<form method="get" class="mb-3 d-flex gap-sm">
  <input class="form-control-wec" type="text" name="q" value="{{ query }}" placeholder="Search drivers…" style="max-width:320px;">
  <button class="btn-wec-primary" type="submit">Search</button>
  <a class="btn-wec-secondary" href="{{ url_for('admin.admin_create_player') }}">Create Driver</a>
</form>
<div class="card-wec"><div class="table-responsive"><table class="table-wec">
  <thead><tr><th>Driver</th><th>Team</th><th>Grade</th><th>OVR</th><th>Age</th><th></th></tr></thead>
  <tbody>
    {% for p in players %}
    <tr>
      <td><strong>{{ p.name }}</strong></td>
      <td class="text-muted-wec">{{ p.team or 'Free Agent' }}</td>
      <td><span class="grade-chip grade-{{ p.grade }}">{{ p.grade }}</span></td>
      <td><span data-ovr="{{ p.overall|int if p.overall else 0 }}">{{ p.overall|round|int if p.overall else '—' }}</span></td>
      <td>{{ p.age or '—' }}</td>
      <td class="text-end"><a class="btn-wec-ghost" href="{{ url_for('admin.admin_edit_player', player_id=p.id) }}">Edit</a></td>
    </tr>
    {% endfor %}
  </tbody>
</table></div></div>
{% endblock %}
